<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Date Display</title>
</head>
<body>

    <h2>Current Date and Time:</h2>
    <!-- This div will display the date and time -->
    <div id="date-time-display"></div>

    <script>
        // Function to get the current date and time and display it
        function updateDateTime() {
            const displayElement = document.getElementById('date-time-display');
            const currentDate = new Date();

            // Format the date and time string (you can customize the format)
            const dateString = currentDate.toLocaleString(); 
            
            // Update the content of the div
            displayElement.textContent = dateString;
        }

        // Call the function immediately upon page load
        updateDateTime();

        // Update the date and time every 1 seconds (1000 milliseconds)
        setInterval(updateDateTime, 1000);
