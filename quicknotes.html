<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Notepad</title>
    <style>
        /* Basic CSS styling */
        body { font-family: sans-serif; margin: 20px; }
        textarea { width: 100%; height: 400px; padding: 10px; box-sizing: border-box; }
        button { margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Web Notepad</h1>
    <textarea id="notepad" placeholder="Write your notes here..."></textarea>
    <button onclick="saveNote()">Save Note</button>
    <script>
        // JavaScript for functionality
        const notepad = document.getElementById('notepad');

        // Load saved note on page load
        window.onload = function() {
            const savedNote = localStorage.getItem('userNote');
            if (savedNote) {
                notepad.value = savedNote;
            }
        };

        // Save note to local storage
        function saveNote() {
            localStorage.setItem('userNote', notepad.value);
            alert('Note saved!');
        }
    </script>
</body>
</html>
<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Date Display</title>
</head>
<body>

    <h2>Current Date and Time:</h2>
    <!-- This div will display the date and time -->
    <div id="date-time-display"></div>

    <script>
        // Function to get the current date and time and display it
        function updateDateTime() {
            const displayElement = document.getElementById('date-time-display');
            const currentDate = new Date();

            // Format the date and time string (you can customize the format)
            const dateString = currentDate.toLocaleString(); 
            
            // Update the content of the div
            displayElement.textContent = dateString;
        }

        // Call the function immediately upon page load
        updateDateTime();

        // Update the date and time every 1 seconds (1000 milliseconds)
        setInterval(updateDateTime, 3000); 
    </script>

</body>
</html>
